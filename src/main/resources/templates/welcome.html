<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Welcome</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .nav-link {
            margin: 15px 0;
        }
        .nav-link a {
            text-decoration: none;
            color: #008CBA;
            margin-right: 15px;
            font-size: 16px;
        }
        .logout-form {
            margin-top: 20px;
            display: inline;
        }
        button {
            padding: 8px 16px;
            background-color: #f44336;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #da190b;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Welcome to Application Gopal 🚀</h1>

    <div class="nav-link">
        <a href="/employees">View Employees</a>
    </div>

    <form class="logout-form" method="post" action="/logout">
        <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
        <button type="submit">Logout</button>
    </form>
</div>
</body>
</html>
